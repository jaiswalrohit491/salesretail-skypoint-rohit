version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables loaded from CSV landing zone"
    tables:
      - name: customers
        description: "Customer master data"
        columns:
          - name: customer_id
            description: "Primary key"
            tests:
              - not_null
          - name: email
            description: "Customer email address (may contain formatting issues)"
          - name: signup_date
            description: "Date customer registered"

      - name: products
        description: "Product catalogue"
        columns:
          - name: product_id
            description: "Primary key"
            tests:
              - not_null
          - name: unit_cost
            description: "Cost to the business (may be negative/corrupt)"
          - name: unit_price
            description: "Selling price"

      - name: stores
        description: "Store master data"
        columns:
          - name: store_id
            description: "Primary key"
            tests:
              - not_null

      - name: orders
        description: "Order header records"
        columns:
          - name: order_id
            description: "Primary key"
            tests:
              - not_null
          - name: status
            description: "Order lifecycle status"
            tests:
              - accepted_values:
                  values: ['completed', 'returned', 'cancelled', 'pending']

      - name: order_items
        description: "Order line items"
        columns:
          - name: order_id
            description: "FK to orders"
            tests:
              - not_null
          - name: product_id
            description: "FK to products"
            tests:
              - not_null
