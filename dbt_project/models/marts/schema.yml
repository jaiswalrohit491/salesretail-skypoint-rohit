version: 2

models:
  - name: dim_customer
    description: "Customer dimension with cohort classification"
    columns:
      - name: customer_sk
        description: "Surrogate key (MD5 hash of customer_id)"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_product
    description: "Product dimension with computed margin and price tier"
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null
      - name: gross_margin_pct
        description: "Gross margin percentage; NULL when unit_cost is missing"

  - name: dim_store
    description: "Store dimension"
    columns:
      - name: store_sk
        tests:
          - unique
          - not_null
      - name: store_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Date dimension spanning 2018–2025"
    columns:
      - name: date_id
        description: "Integer surrogate key in YYYYMMDD format"
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: >
      Sales fact table at order-line grain.
      Excludes lines with invalid quantity (0 or negative).
      Cancelled and returned orders are included but flagged via status.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: date_id
        tests:
          - not_null
      - name: net_revenue
        description: "Revenue after discount applied"
      - name: gross_profit
        description: "Net revenue minus COGS"
